services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: floq
      POSTGRES_USER: floq
      POSTGRES_PASSWORD: floq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
