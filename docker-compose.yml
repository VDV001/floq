services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: floq
      POSTGRES_USER: floq
      POSTGRES_PASSWORD: floq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floq"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://floq:floq@postgres:5432/floq?sslmode=disable
      REDIS_URL: redis://redis:6379
      MIGRATIONS_PATH: "file:///migrations"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
