name: CI

on:
  push:
    branches: [main, develop, "refactor/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: floq_test
          POSTGRES_USER: floq
          POSTGRES_PASSWORD: floq
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      # Build every package, not just cmd/server. Catches downstream
      # build breaks when a signature change to a port leaves consumer
      # packages compiling individually but the binary unbuildable.
      # See issue #44 for the P0-3 incident that motivated widening
      # the scope.
      - name: Build (all packages)
        run: go build ./...

      # Vet integration-tagged files too. `go vet ./...` skips files
      # behind build tags by default, so an outdated integration test
      # signature can slip through until somebody runs the tagged
      # suite locally. This catches it at the same gate as the rest.
      - name: Vet (integration tag)
        run: go vet -tags=integration ./...

      - name: Test
        run: go test -race -count=1 ./...
        env:
          DATABASE_URL: postgres://floq:floq@localhost:5432/floq_test?sslmode=disable

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  tooling:
    name: Tooling (bin/)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Pure functions in bin/release.sh are exercised by a self-contained
      # bash harness. Requires perl + jq, both preinstalled on ubuntu-latest.
      # Keeps release tooling from rotting between releases: if a sync
      # point shifts, the test fails here before a real bump fails in
      # someone's hands.
      - name: Release script test harness
        run: bin/release_test.sh
